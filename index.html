<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title and Logo -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- daisy UI and tailwind -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body>
    <section>
        <nav class="bg-white shadow p-4 flex justify-between items-center">
            <div class="flex items-center text-center gap-2 w-full">
                <img class="w-[36px]" src="./assets/github-logo.png" alt="">
                <h2 class="text-xl font-semibold mb-5 text-[#1F2937] mt-5 ">GitHub Issues Tracker</h2>
            </div>

            <div class="flex gap-4 h-[44px]">
                
                <input id="searchInput" class="border-gray-300 rounded px-3 py-2 text-[#64748B]" type="text" placeholder="Search issues..."/>

                <button onclick="searchIssue()" class="bg-[#4A00FF] rounded hover:cursor-pointer font-normal text-white px-4 py-1 w-[140px]"> <span><i class="fa-solid fa-plus"></i></span> New Issue </button>

            </div>
        </nav>
    </section>

    <section>
        <div class="flex gap-4 m-6 p-6">

            <button onclick="tabChange(event,'all')" class="btn-tab bg-indigo-600 text-white px-4 py-2 rounded cursor-pointer"> All (<span id="allCount">0</span>)</button>

            <button onclick="tabChange(event,'open')" class="btn-tab bg-gray-200 px-4 py-2 rounded cursor-pointer"> Open (<span id="openCount">0</span>)</button>
            
            <button onclick="tabChange(event,'closed')" class="btn-tab bg-gray-200 px-4 py-2 rounded cursor-pointer"> Closed (<span id="closedCount">0</span>)</button>

        </div>
    </section>

    <section>
        <div>
            <div class="flex gap-2 ml-6 mb-5 ">
                <img class="w-[50px]" src="./assets/Aperture.png" alt="">
                <div>
                    <h3 class="font-semibold">50 Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
        </div>
    </section>

    <section id="spinner" class="flex items-center justify-center py-8 hidden">
        <span class="loading loading-spinner text-primary"></span>
    </section>

    <section>
        <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        </div>
    </section>

    <script src="./script.js"></script>
</body>
</html>
